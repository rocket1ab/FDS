<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1180" viewBox="0 0 1400 1180">
  <style>
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;letter-spacing:0;fill:#173042}
    .title{font-size:27px;font-weight:700}.paneltitle{font-size:21px;font-weight:700}.node{font-size:16px;font-weight:600}.small{font-size:14px;fill:#526b79}
    .line{stroke:#6c8190;stroke-width:2.2;fill:none}.panel{fill:#fff;stroke:#c8d5dc;stroke-width:1.5}
    .major{fill:#dcebf3;stroke:#2d6585;stroke-width:2}.secondary{fill:#e9e7f4;stroke:#615793;stroke-width:2}
  </style>
  <rect width="1400" height="1180" fill="#f7fafb"/>
  <text x="42" y="48" class="title">PDF 四个系统的毁伤条件与底事件重绘</text>
  <text x="42" y="78" class="small">依据毁伤标准 PDF 表10及表13至表15重绘；蓝色为主要要害节点，紫色为次要要害节点</text>

  <g transform="translate(42 108)">
    <rect width="640" height="390" rx="7" class="panel"/>
    <text x="26" y="38" class="paneltitle">机体结构系统</text>
    <rect x="205" y="62" width="230" height="52" rx="5" fill="#d9e9f1" stroke="#2d6585" stroke-width="2"/>
    <text x="320" y="95" text-anchor="middle" class="node">机体结构系统毁伤</text>
    <path d="M320 114V148" class="line"/>
    <rect x="220" y="148" width="200" height="62" rx="5" class="major"/>
    <text x="320" y="176" text-anchor="middle" class="node">机头结构</text><text x="320" y="198" text-anchor="middle" class="small">主要要害节点</text>
    <rect x="24" y="245" width="592" height="116" rx="5" fill="#f8fafb" stroke="#d4dee4"/>
    <text x="44" y="276" class="node" fill="#bd3d2f">重度：机头结构重度 → 系统重度</text>
    <text x="44" y="309" class="node" fill="#9b6b12">中度：机头结构中度，且不存在重度 → 系统中度</text>
    <text x="44" y="342" class="node" fill="#287258">轻度：机头结构轻度，且不存在中度或重度 → 系统轻度</text>
  </g>

  <g transform="translate(718 108)">
    <rect width="640" height="390" rx="7" class="panel"/>
    <text x="26" y="38" class="paneltitle">航电系统</text>
    <rect x="205" y="62" width="230" height="52" rx="5" fill="#e3e0f2" stroke="#615793" stroke-width="2"/>
    <text x="320" y="95" text-anchor="middle" class="node">航电系统毁伤</text>
    <path d="M320 114V138M82 138H558M82 138V158M201 138V158M320 138V158M439 138V158M558 138V158" class="line"/>
    <rect x="30" y="158" width="104" height="72" rx="5" class="major"/><rect x="149" y="158" width="104" height="72" rx="5" class="major"/>
    <rect x="268" y="158" width="104" height="72" rx="5" class="secondary"/><rect x="387" y="158" width="104" height="72" rx="5" class="secondary"/><rect x="506" y="158" width="104" height="72" rx="5" class="secondary"/>
    <text x="82" y="187" text-anchor="middle" class="node">雷达</text><text x="82" y="213" text-anchor="middle" class="small">主要</text>
    <text x="201" y="187" text-anchor="middle" class="node">导航</text><text x="201" y="213" text-anchor="middle" class="small">主要</text>
    <text x="320" y="187" text-anchor="middle" class="node">通信</text><text x="320" y="213" text-anchor="middle" class="small">次要</text>
    <text x="439" y="187" text-anchor="middle" class="node">光电子</text><text x="439" y="213" text-anchor="middle" class="small">次要</text>
    <text x="558" y="182" text-anchor="middle" class="node"><tspan x="558">电子</tspan><tspan x="558" dy="21">对抗</tspan></text><text x="558" y="222" text-anchor="middle" class="small">次要</text>
    <rect x="24" y="250" width="592" height="116" rx="5" fill="#f8fafb" stroke="#d4dee4"/>
    <text x="44" y="280" class="node" fill="#bd3d2f">重度：雷达或导航至少一个重度 → 系统重度</text>
    <text x="44" y="313" class="node" fill="#9b6b12">中度：主要节点中度，或次要节点重度，且无主要节点重度</text>
    <text x="44" y="346" class="node" fill="#287258">轻度：至少一个节点轻度，且未触发中度或重度</text>
  </g>

  <g transform="translate(42 526)">
    <rect width="640" height="390" rx="7" class="panel"/>
    <text x="26" y="38" class="paneltitle">电力系统</text>
    <rect x="205" y="62" width="230" height="52" rx="5" fill="#f5e6bf" stroke="#9b6b12" stroke-width="2"/>
    <text x="320" y="95" text-anchor="middle" class="node">电力系统毁伤</text>
    <path d="M320 114V148M205 148H435M205 148V168M435 148V168" class="line"/>
    <rect x="115" y="168" width="180" height="66" rx="5" class="major"/><rect x="345" y="168" width="180" height="66" rx="5" class="major"/>
    <text x="205" y="197" text-anchor="middle" class="node">电池</text><text x="205" y="220" text-anchor="middle" class="small">主要要害节点</text>
    <text x="435" y="197" text-anchor="middle" class="node">电力传输子系统</text><text x="435" y="220" text-anchor="middle" class="small">主要要害节点</text>
    <rect x="24" y="262" width="592" height="104" rx="5" fill="#f8fafb" stroke="#d4dee4"/>
    <text x="44" y="291" class="node" fill="#bd3d2f">重度：电池或电力传输至少一个重度 → 系统重度</text>
    <text x="44" y="323" class="node" fill="#9b6b12">中度：至少一个中度且无重度 → 系统中度</text>
    <text x="44" y="352" class="node" fill="#287258">轻度：至少一个轻度且无中度、重度 → 系统轻度</text>
  </g>

  <g transform="translate(718 526)">
    <rect width="640" height="390" rx="7" class="panel"/>
    <text x="26" y="38" class="paneltitle">座舱系统</text>
    <rect x="205" y="62" width="230" height="52" rx="5" fill="#dceee5" stroke="#287258" stroke-width="2"/>
    <text x="320" y="95" text-anchor="middle" class="node">座舱系统毁伤</text>
    <path d="M320 114V148M92 148H548M92 148V168M244 148V168M396 148V168M548 148V168" class="line"/>
    <rect x="27" y="168" width="130" height="66" rx="5" class="major"/><rect x="179" y="168" width="130" height="66" rx="5" class="major"/>
    <rect x="331" y="168" width="130" height="66" rx="5" class="major"/><rect x="483" y="168" width="130" height="66" rx="5" class="major"/>
    <text x="92" y="197" text-anchor="middle" class="node">环控子系统</text><text x="92" y="220" text-anchor="middle" class="small">主要</text>
    <text x="244" y="191" text-anchor="middle" class="node"><tspan x="244">窗户及</tspan><tspan x="244" dy="21">玻璃</tspan></text><text x="244" y="227" text-anchor="middle" class="small">主要</text>
    <text x="396" y="191" text-anchor="middle" class="node"><tspan x="396">座舱内部</tspan><tspan x="396" dy="21">设施</tspan></text><text x="396" y="227" text-anchor="middle" class="small">主要</text>
    <text x="548" y="197" text-anchor="middle" class="node">操纵子系统</text><text x="548" y="220" text-anchor="middle" class="small">主要</text>
    <rect x="24" y="262" width="592" height="104" rx="5" fill="#f8fafb" stroke="#d4dee4"/>
    <text x="44" y="291" class="node" fill="#bd3d2f">重度：任一主要功能节点重度 → 系统重度</text>
    <text x="44" y="323" class="node" fill="#9b6b12">中度：任一主要功能节点中度且无重度 → 系统中度</text>
    <text x="44" y="352" class="node" fill="#287258">轻度：任一节点轻度且无中度、重度 → 系统轻度</text>
  </g>

  <rect x="42" y="944" width="1316" height="190" rx="7" fill="#fff" stroke="#c8d5dc" stroke-width="1.5"/>
  <text x="66" y="982" class="paneltitle">逻辑门解释</text>
  <text x="66" y="1018" class="node">主要节点重度 → 系统重度；主要节点中度或次要节点重度 → 系统中度。</text>
  <text x="66" y="1052" class="node">轻度、中度判定均带有“不得存在更高等级触发事件”的约束，因此等级具有明确优先级。</text>
  <text x="66" y="1086" class="small">当前 H1-H7 模型通过映射表接入这些 PDF 功能节点，新增材料实体用于提供热响应证据，不改变 PDF 顶层系统逻辑。</text>
  <rect x="970" y="982" width="28" height="24" rx="3" class="major"/><text x="1008" y="1001" class="small">主要要害节点</text>
  <rect x="970" y="1022" width="28" height="24" rx="3" class="secondary"/><text x="1008" y="1041" class="small">次要要害节点</text>
</svg>
